version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════════
# Backend System — Docker Compose
#
# Services:
#   Infrastructure : mongo-iam, mongo-core, mongo-express (dev UI)
#   Application    : api-gateway, bff-service, iam-service, core-service
#
# Networks:
#   public-net  : app services giao tiếp với nhau
#   db-net      : services ↔ MongoDB (internal, không có internet)
#
# Nguyên tắc bảo mật:
#   - MongoDB KHÔNG expose port ra host trong production
#   - api-gateway là entry point duy nhất từ bên ngoài (port 3000)
#   - bff-service, iam-service, core-service dùng expose (không phải ports)
#   - db-net là internal network — MongoDB không thể kết nối internet
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE — MongoDB
  # ─────────────────────────────────────────────────────────────────────────────

  mongo-iam:
    image: mongo:7
    container_name: mongo-iam
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: iam_service
    volumes:
      - mongo-iam-data:/data/db
    networks:
      - db-net
    # Expose ra host chỉ để dev dùng Compass/mongosh trực tiếp
    # Xóa dòng ports này trong production
    ports:
      - "27017:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongo-core:
    image: mongo:7
    container_name: mongo-core
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      MONGO_INITDB_DATABASE: core_service
    volumes:
      - mongo-core-data:/data/db
    networks:
      - db-net
    ports:
      - "27018:27017"
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # MongoDB Admin UI — chỉ chạy khi profile dev
  # Lệnh: docker compose --profile dev up
  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongo-iam:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-root}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-rootpassword}
      ME_CONFIG_MONGODB_SERVER: mongo-iam
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASS:-adminpass}
    ports:
      - "8081:8081"
    networks:
      - db-net
    profiles:
      - dev

  # ─────────────────────────────────────────────────────────────────────────────
  # APPLICATION SERVICES
  # Thứ tự khởi động: mongo → iam + core → bff → gateway
  # ─────────────────────────────────────────────────────────────────────────────

  iam-service:
    build:
      context: ./iam-service
      dockerfile: Dockerfile
    container_name: iam-service
    restart: unless-stopped
    depends_on:
      mongo-iam:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongo-iam:27017/iam_service?authSource=admin
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@yourapp.com}
    # expose: chỉ mở port trong Docker network, KHÔNG ra host
    expose:
      - "3001"
    networks:
      - public-net
      - db-net
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  core-service:
    build:
      context: ./core-service
      dockerfile: Dockerfile
    container_name: core-service
    restart: unless-stopped
    depends_on:
      mongo-core:
        condition: service_healthy
    environment:
      PORT: 3002
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-root}:${MONGO_ROOT_PASSWORD:-rootpassword}@mongo-core:27017/core_service?authSource=admin
      TRUSTED_HOSTS: api-gateway,bff-service
    expose:
      - "3002"
    networks:
      - public-net
      - db-net
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3002/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: bff-service
    restart: unless-stopped
    depends_on:
      iam-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
    environment:
      PORT: 3003
      NODE_ENV: ${NODE_ENV:-development}
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      IAM_SERVICE_URL: http://iam-service:3001
      CORE_SERVICE_URL: http://core-service:3002
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS:-8000}
    expose:
      - "3003"
    networks:
      - public-net
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3003/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    depends_on:
      iam-service:
        condition: service_healthy
      core-service:
        condition: service_healthy
      bff-service:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      IAM_SERVICE_URL: http://iam-service:3001
      CORE_SERVICE_URL: http://core-service:3002
      BFF_SERVICE_URL: http://bff-service:3003
      INTERNAL_SECRET: ${INTERNAL_SECRET:?INTERNAL_SECRET is required}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
    # Entry point duy nhất expose ra bên ngoài
    ports:
      - "3000:3000"
    networks:
      - public-net
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

# ─────────────────────────────────────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────────────────────────────────────
networks:
  public-net:
    driver: bridge
    name: backend-public-net

  db-net:
    driver: bridge
    name: backend-db-net
    internal: true # MongoDB không có internet — chỉ giao tiếp nội bộ

# ─────────────────────────────────────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  mongo-iam-data:
    name: mongo-iam-data
  mongo-core-data:
    name: mongo-core-data
